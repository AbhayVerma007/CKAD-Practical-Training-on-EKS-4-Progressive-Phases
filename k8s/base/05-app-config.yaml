apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: app
  labels:
    app: smalllinks
data:
  BASE_URL: "http://smalllinks-frontend.app.svc.cluster.local"
  PORT: "8201"
  SHORTENER_DEBUG: "true"
  SHORT_URL_LENGTH: "5"
  SHORT_KEY_GENERATION_RETRIES_COUNT: "5"
  KAFKA_HOST: "kafka:9092"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  LOG_LEVEL: "info"
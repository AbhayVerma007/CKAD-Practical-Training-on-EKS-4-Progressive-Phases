apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smalllinks-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AbhayVerma007/CKAD-Practical-Training-on-EKS-4-Progressive-Phases.git'
    targetRevision: HEAD
    path: helm/charts/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AbhayVerma007/CKAD-Practical-Training-on-EKS-4-Progressive-Phases.git'
    targetRevision: HEAD
    path: helm/charts/observability
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true